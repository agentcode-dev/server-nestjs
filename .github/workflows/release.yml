name: Release to npm

on:
  push:
    branches:
      - 'release/v*'

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Run tests

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Run tests
        run: npx jest --ci --runInBand

  release:
    needs: tests
    runs-on: ubuntu-latest
    name: Create release and publish

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Extract version from branch name
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#release/}"
          VERSION_NO_V="${VERSION#v}"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "bare=$VERSION_NO_V" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Verify package.json version matches branch
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.bare }}" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match branch (${{ steps.version.outputs.bare }})"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
